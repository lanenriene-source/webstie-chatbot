<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTRH Fandom Assistant</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f7fb}
#chatbot{width:100%;max-width:750px;height:700px;margin:auto;display:flex;flex-direction:column;border-radius:20px;overflow:hidden;background:white;box-shadow:0 5px 20px rgba(0,0,0,.15)}
#header{background:#6C63FF;color:white;padding:18px;font-size:20px;font-weight:bold}
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.message{max-width:80%;padding:12px 16px;border-radius:18px;line-height:1.5;white-space:pre-wrap}
.bot{align-self:flex-start;background:#ECEEF6;border-bottom-left-radius:5px}
.user{align-self:flex-end;background:#6C63FF;color:white;border-bottom-right-radius:5px}
#prompts{padding:15px;border-top:1px solid #ddd;display:flex;flex-wrap:wrap;gap:10px;background:white}
.prompt-btn{border:none;padding:10px 14px;border-radius:20px;cursor:pointer;background:#ECEEF6}
.back-btn{background:#FFD966}
</style>
</head>
<body>
<div id="chatbot">
<div id="header">DTRH Fandom Assistant</div>
<div id="messages"></div>
<div id="prompts"></div>
</div>
<script>
const faqData={
"General Fandom Questions":{"What is fandom etiquette?":"The number one golden rule is: Don't like? Just block!","Are there any fandom taboos I should keep in mind?":"Sharing unofficial translations or screenshots is often frowned upon in Korean fandoms.","Why should I buy from official sources?":"Supporting official releases helps creators continue making the stories fans enjoy."},
"Website-related Questions":{"What does this site actually do?":"DTRH helps fans participate more actively in fandoms and discover new ones.","Why was this website created?":"The site was created to help newer fans find content and communities more easily.","Who were the characters used in the guide videos?":"The guide videos use Houshou Marine and Amane Kanata from Hololive.","What types of content can I find using this website?":"Guides, merchandise information, fan events and recommendations."},
"Guide-related Questions":{"Where do I look for unofficial content translations?":"Examples include Mangago and NovelUpdates.","Where do I look for official content translations?":"Common platforms include Crunchyroll, Tapas and iQIYI.","Where do I look for raws for non-English content?":"Kakaopage is common for Korean content and JJWXC for Chinese novels.","Where should I go to look for official merchandise?":"Following official publisher social media accounts is usually best.","Where do I buy fan-made merchandise from?":"Fan artists often sell through conventions, group orders and social media."},
"Recommendations":{"What are some recommended titles for newbies to C-novels?":"Lord of the Mysteries is a popular recommendation.","What are some recommended titles for newbies to K-novels?":"Omniscient Reader, My S-Class Hunters and Lout of the Count's Family are frequently recommended.","Where can I find other people who have the same interests as me?":"X, Instagram and Tumblr are great places to meet fellow fans."}
};
const messages=document.getElementById("messages"),prompts=document.getElementById("prompts");
function addMessage(t,type){const d=document.createElement("div");d.className=`message ${type}`;d.innerText=t;messages.appendChild(d);messages.scrollTop=messages.scrollHeight;}
function showCategories(){prompts.innerHTML="";Object.keys(faqData).forEach(c=>{const b=document.createElement("button");b.className="prompt-btn";b.innerText=c;b.onclick=()=>{addMessage(c,"user");showQuestions(c)};prompts.appendChild(b);});}
function showQuestions(c){prompts.innerHTML="";const back=document.createElement("button");back.className="prompt-btn back-btn";back.innerText="⬅ Back";back.onclick=showCategories;prompts.appendChild(back);Object.keys(faqData[c]).forEach(q=>{const b=document.createElement("button");b.className="prompt-btn";b.innerText=q;b.onclick=()=>{addMessage(q,"user");setTimeout(()=>addMessage(faqData[c][q],"bot"),400)};prompts.appendChild(b);});}
addMessage("Hello! Welcome to the DTRH Fandom Assistant. Please select a category below to begin.","bot");
showCategories();
</script>
</body>
</html>
